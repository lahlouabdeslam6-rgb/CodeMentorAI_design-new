{% extends 'admin/base_admin.html' %}
{% block title %}Réinitialiser mot de passe — CodeMentor AI{% endblock %}
{% block content %}
<div class="page-content">

  <a href="{% url 'admin_user_detail' target_user.id %}" class="btn btn-ghost" style="margin-bottom:1rem">← Retour</a>

  <div class="card" style="max-width:400px">
    <div class="card-title">Réinitialiser le mot de passe</div>
    <p style="margin-bottom:1rem;color:var(--wh2);font-size:13px">
      Utilisateur : <strong>{{ target_user.username }}</strong>
    </p>

    <form method="post">
      {% csrf_token %}
      <div class="form-group">
        <label class="form-label">Nouveau mot de passe</label>
        <input type="password" name="new_password" class="form-control" placeholder="••••••••" required>
      </div>
      <div class="form-group">
        <label class="form-label">Confirmer le mot de passe</label>
        <input type="password" name="confirm_password" class="form-control" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn btn-primary">Réinitialiser</button>
    </form>
  </div>

</div>
{% endblock %}
