{% extends 'base.html' %}
{% block title %}Connexion — CodeMentor AI{% endblock %}

{% block content %}
<div class="auth-wrapper">
  <div class="auth-box">
    <div class="auth-title">Connexion</div>
    <div class="auth-sub">Bienvenue de retour 👋</div>

    <form method="post">
      {% csrf_token %}
      <div class="form-group">
        <label class="form-label">Nom d'utilisateur ou Email</label>
        <input type="text" name="username" class="form-control" placeholder="ton_username ou email@exemple.com" autocomplete="username" required autofocus>
      </div>
      <div class="form-group">
        <label class="form-label">Mot de passe</label>
        <input type="password" name="password" class="form-control" placeholder="••••••••" autocomplete="current-password" required>
      </div>
      {% if form.errors %}
        <div class="alert alert-error" style="margin-bottom:1rem">Identifiants incorrects. Réessaie.</div>
      {% endif %}
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center">Se connecter</button>
    </form>

    <div class="auth-link">
      Pas encore de compte ? <a href="{% url 'register' %}">Créer un compte</a>
    </div>
  </div>
</div>
{% endblock %}
